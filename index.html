<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Maps Lab 4</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>My Name Map (S Shape)</h1>
<p>CSS test</p>

body {
    font-family: Arial;
    text-align: center;
    background: lightyellow;
}

p {
    color: red;
    font-size: 30px;
}

#map {
    height: 500px;
    width: 80%;
    margin: auto;
    border: 3px solid black;
}

<div id="map"></div>

<div class="controls">
    <button onclick="toggleBicycle()">Bicycle</button>
    <button onclick="toggleTransit()">Transit</button>
    <button onclick="toggleTraffic()">Traffic</button>
</div>

<script src="script.js"></script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAOPafLgm76zAfEnQKJRd0Mnx51FycSJz0&callback=initMap">
</script>

</body>
</html>
